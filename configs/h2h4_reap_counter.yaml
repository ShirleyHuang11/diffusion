# H2/H4 REAP arm on sparse Counter Circuit (task18).
# Shaping is governed by the SCOPE-SPECIFIC teacher-quality artifact
# (reports/teacher_quality_hybrid_counter.json): if the counter warmup
# ladder or generation-quality gates fail, that artifact disables shaping
# and this arm runs gate-disabled with the reason in its audit trail —
# reported explicitly in the H2/H4 report. Same protocol family as every
# arm: lossless encoding, horizon 400, exact 5,000,000 steps, seeds {0,1,2}.
run:
  name: h2h4_reap_counter
  seed: 0
  mode: paper
  out_dir: runs
  max_wall_clock_minutes: 2160
  device: cpu

env:
  id: overcooked
  layout: counter_circuit
  horizon: 400
  encoding: lossless

algo:
  name: reap_mappo
  total_env_steps: 5000000
  params:
    rollout_length: 1024
    hidden_size: 128
    entropy_coef: 0.02
    quality_report: reports/teacher_quality_hybrid_counter.json
    predictors: runs/teacher_hybrid_counter/predictors.pt
    calibration_payload: runs/teacher_hybrid_counter/calibration_holdout.npz
    teacher: runs/teacher_hybrid_counter/teacher.pt
    probe_observations: runs/teacher_hybrid_counter/probe_observations.npy
    refresh_mode: policy_conditioned
    refresh_every_k_updates: 200

logging:
  interval_env_steps: 25000

checkpoint:
  interval_env_steps: 250000
