# Benchmark gate: vanilla MAPPO on sparse Cramped Room.
# Protocol: fixed budget 5M env steps; seeds {0,1,2} via `--seed`;
# gate threshold (success rate >= 0.8 over the rolling episode window)
# evaluated by scripts/run_report.py. The gate is a measured benchmark,
# not an open-ended training expectation; a miss is a documented result.
run:
  name: gate_mappo_cramped
  seed: 0
  mode: paper
  out_dir: runs
  max_wall_clock_minutes: 2160  # SLURM job limit guard (36h)
  device: cpu

env:
  id: overcooked
  layout: cramped_room
  horizon: 400
  encoding: lossless

algo:
  name: mappo
  total_env_steps: 5000000
  params:
    rollout_length: 1024
    hidden_size: 128
    entropy_coef: 0.02

logging:
  interval_env_steps: 25000

checkpoint:
  interval_env_steps: 250000
