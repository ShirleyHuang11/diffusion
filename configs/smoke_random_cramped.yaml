# Smoke-mode infrastructure exercise: random policy on sparse Cramped Room.
run:
  name: smoke_random_cramped
  seed: 0
  mode: smoke
  out_dir: runs
  max_wall_clock_minutes: 10
  device: cpu

env:
  id: overcooked
  layout: cramped_room
  horizon: 400
  encoding: lossless

algo:
  name: random
  total_env_steps: 2000

logging:
  interval_env_steps: 500

checkpoint:
  interval_env_steps: 1000
