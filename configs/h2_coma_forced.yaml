# H2 baseline arm: in-repo COMA on sparse forced_coordination (task18, AC-9.2).
# Same harness as every protocol arm: lossless encoding, horizon 400,
# exact 5,000,000-step budget, seeds {0,1,2} via --seed. Use in H2 claims
# is gated on reports/sanity_coma_spread.json verdict PASS.
run:
  name: h2_coma_forced
  seed: 0
  mode: paper
  out_dir: runs
  max_wall_clock_minutes: 2160
  device: cpu

env:
  id: overcooked
  layout: forced_coordination
  horizon: 400
  encoding: lossless

algo:
  name: coma
  total_env_steps: 5000000
  params:
    rollout_length: 1024
    hidden_size: 128
    entropy_coef: 0.02
    actor_lr: 0.0005
    critic_lr: 0.0005
    td_lambda: 0.8
    target_update_interval: 10

logging:
  interval_env_steps: 25000

checkpoint:
  interval_env_steps: 250000
