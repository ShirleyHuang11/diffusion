# H4 baseline arm: MAPPO + count-based intrinsic bonus on sparse forced_coordination
# (task18, AC-9.2). Equal tuning budget with the RND arm: identical trunk
# hyperparameters and intrinsic_coef, only the bonus type differs.
run:
  name: h4_count_forced
  seed: 0
  mode: paper
  out_dir: runs
  max_wall_clock_minutes: 2160
  device: cpu

env:
  id: overcooked
  layout: forced_coordination
  horizon: 400
  encoding: lossless

algo:
  name: mappo
  total_env_steps: 5000000
  params:
    rollout_length: 1024
    hidden_size: 128
    entropy_coef: 0.02
    intrinsic: count
    intrinsic_coef: 1.0

logging:
  interval_env_steps: 25000

checkpoint:
  interval_env_steps: 250000
