# Invariance sanity check — SHAPED arm: MAPPO+RND with the hand-crafted
# progress potential as PBRS on sparse Cramped Room.
# Unshaped arm: probe_mappo_rnd_cramped (identical config minus shaping;
# protocol-exact runs already archived in reports/probe_mappo_rnd_cramped).
# PBRS invariance predicts both arms converge to comparable final extrinsic
# returns; divergence would flag a shaping-implementation defect.
run:
  name: invariance_shaped_rnd_cramped
  seed: 0
  mode: paper
  out_dir: runs
  max_wall_clock_minutes: 2160
  device: cpu

env:
  id: overcooked
  layout: cramped_room
  horizon: 400
  encoding: lossless

algo:
  name: mappo
  total_env_steps: 5000000
  params:
    rollout_length: 1024
    hidden_size: 128
    entropy_coef: 0.02
    intrinsic: rnd
    intrinsic_coef: 1.0
    shaping_potential: overcooked_progress
    shaping_beta: 5.0

logging:
  interval_env_steps: 25000

checkpoint:
  interval_env_steps: 250000
