# Smoke-mode MAPPO exercise on sparse Cramped Room (CPU, minutes).
run:
  name: smoke_mappo_cramped
  seed: 0
  mode: smoke
  out_dir: runs
  max_wall_clock_minutes: 20
  device: cpu

env:
  id: overcooked
  layout: cramped_room
  horizon: 400
  encoding: lossless

algo:
  name: mappo
  total_env_steps: 8192
  params:
    rollout_length: 256
    hidden_size: 64

logging:
  interval_env_steps: 2048

checkpoint:
  interval_env_steps: 4096
