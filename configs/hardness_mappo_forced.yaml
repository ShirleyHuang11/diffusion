# Hardness profile: vanilla MAPPO on sparse Forced Coordination.
# Same protocol as the Cramped Room gate (5M steps, seeds {0,1,2} via --seed).
# Low/no success is the expected, documented outcome motivating dense shaping.
run:
  name: hardness_mappo_forced
  seed: 0
  mode: paper
  out_dir: runs
  max_wall_clock_minutes: 2160
  device: cpu

env:
  id: overcooked
  layout: forced_coordination
  horizon: 400
  encoding: lossless

algo:
  name: mappo
  total_env_steps: 5000000
  params:
    rollout_length: 1024
    hidden_size: 128
    entropy_coef: 0.02

logging:
  interval_env_steps: 25000

checkpoint:
  interval_env_steps: 250000
