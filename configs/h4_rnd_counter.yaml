# H4 baseline arm: MAPPO + RND on sparse counter_circuit (task18, AC-9.2).
# Mirrors first_integration_rnd_forced exactly (same trunk/bonus settings);
# also provides the fallback warmup-ladder rung for the counter-scope REAP
# teacher pipeline.
run:
  name: h4_rnd_counter
  seed: 0
  mode: paper
  out_dir: runs
  max_wall_clock_minutes: 2160
  device: cpu

env:
  id: overcooked
  layout: counter_circuit
  horizon: 400
  encoding: lossless

algo:
  name: mappo
  total_env_steps: 5000000
  params:
    rollout_length: 1024
    hidden_size: 128
    entropy_coef: 0.02
    intrinsic: rnd
    intrinsic_coef: 1.0

logging:
  interval_env_steps: 25000

checkpoint:
  interval_env_steps: 250000
