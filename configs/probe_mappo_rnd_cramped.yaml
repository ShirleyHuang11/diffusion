# Exploration probe: MAPPO + RND on sparse Cramped Room.
# Purpose: vanilla MAPPO measured 0.0 success on sparse Cramped Room at the
# 5M-step gate; this probe measures whether RND-driven exploration reaches
# deliveries at all — it informs the warmup-buffer fallback ladder
# (vanilla -> +RND) that the diffusion teacher depends on. Same protocol
# as the gate; results are a measurement either way.
run:
  name: probe_mappo_rnd_cramped
  seed: 0
  mode: paper
  out_dir: runs
  max_wall_clock_minutes: 2160
  device: cpu

env:
  id: overcooked
  layout: cramped_room
  horizon: 400
  encoding: lossless

algo:
  name: mappo
  total_env_steps: 5000000
  params:
    rollout_length: 1024
    hidden_size: 128
    entropy_coef: 0.02
    intrinsic: rnd
    intrinsic_coef: 1.0

logging:
  interval_env_steps: 25000

checkpoint:
  interval_env_steps: 250000
